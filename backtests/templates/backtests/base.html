<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Backtester{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        [htmx-indicator] { display: none; }
        .htmx-request [htmx-indicator] { display: inline-flex; }
        .htmx-request.htmx-indicator { display: inline-flex; }
    </style>
</head>
<body class="h-full text-gray-100" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <nav class="bg-gray-900 border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="{% url 'backtests:index' %}" class="text-xl font-bold text-white">Backtester</a>
            <div class="flex gap-4 text-sm text-gray-400">
                <a href="{% url 'backtests:index' %}" class="hover:text-white">Dashboard</a>
                <a href="{% url 'trading:index' %}" class="hover:text-white">Live Trading</a>
                <a href="/admin/" class="hover:text-white">Admin</a>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
